<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BSC5 Star Editor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="application-name" content="BSC5 Star Editor">
  <meta name="theme-color" content="#10121a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Star Editor">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/star-editor.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="toolbar">
    <div class="group">
      <button id="btn-open">Open…</button>
      <button id="btn-save" disabled>Save</button>
      <button id="btn-save-as" disabled>Save As…</button>
    </div>
    <div class="group separated">
      <button id="btn-add" disabled>Add Star</button>
      <button id="btn-delete" disabled>Delete</button>
      <button id="btn-move" type="button" disabled aria-label="Enable moving" title="Enable moving">🔒</button>
    </div>
    <div class="group separated">
      <div id="star-size-toggle" class="toolbar-toggle" role="group" aria-label="Star size">
        <button class="star-size-btn" type="button" data-size="small" aria-label="Small stars" aria-pressed="false" title="Small stars">
          <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
            <g transform="translate(8 8) scale(0.5) translate(-8 -8)">
              <path d="M8 1.2L9.55 6.45L14.8 8L9.55 9.55L8 14.8L6.45 9.55L1.2 8L6.45 6.45Z" fill="currentColor"/>
            </g>
          </svg>
        </button>
        <button class="star-size-btn" type="button" data-size="medium" aria-label="Medium stars" aria-pressed="false" title="Medium stars">
          <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
            <g transform="translate(8 8) scale(0.72) translate(-8 -8)">
              <path d="M8 1.2L9.55 6.45L14.8 8L9.55 9.55L8 14.8L6.45 9.55L1.2 8L6.45 6.45Z" fill="currentColor"/>
            </g>
          </svg>
        </button>
        <button class="star-size-btn" type="button" data-size="large" aria-label="Large stars" aria-pressed="false" title="Large stars">
          <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
            <g transform="translate(8 8) scale(0.94) translate(-8 -8)">
              <path d="M8 1.2L9.55 6.45L14.8 8L9.55 9.55L8 14.8L6.45 9.55L1.2 8L6.45 6.45Z" fill="currentColor"/>
            </g>
          </svg>
        </button>
      </div>
    </div>
    <div class="group separated">
      <button id="btn-grid" type="button">RA/Dec Grid</button>
      <button id="btn-altaz-grid" type="button">Alt/Az Grid</button>
    </div>
    <div class="group grow">
      <label class="slider">
        Brightness
        <input id="brightness" type="range" min="0" max="3" step="0.01" value="1.301">
        <span id="brightness-readout">×1.00</span>
      </label>
    </div>
    <div class="group">
      <div id="sky-mode-toggle" role="group" aria-label="View mode">
        <button class="sky-mode-btn active" data-mode="allsky">All-sky</button>
        <button class="sky-mode-btn" data-mode="highlight">+ Horizon</button>
        <button class="sky-mode-btn" data-mode="local">Local</button>
      </div>
    </div>
    <div class="group">
      <span id="status">No catalog loaded</span>
    </div>
  </header>

  <main>
    <div id="sky-wrap">
      <canvas id="sky"></canvas>
      <canvas id="sky-grid" aria-hidden="true"></canvas>
      <div id="usage-hint" aria-hidden="true">
        <div>LMB  - Select</div>
        <div>RMB - Look around</div>
		<div>Wheel - Zoom</div>
      </div>
      <div id="banner" class="hidden"></div>
    </div>
    <aside id="panel">
      <div id="panel-empty" class="panel-empty">No star selected.<br>Click a star to edit.</div>
      <form id="panel-form" class="hidden" autocomplete="off">
        <h3 id="panel-title">Star</h3>
        <div id="panel-subtitle" class="hidden">
          <span id="subtitle-class"></span>
          <span id="subtitle-dist"></span>
        </div>

        <div class="row">
          <label>HYG <input id="f-hyg-id" type="number" readonly></label>
          <label>HD <input id="f-hd" type="number" readonly></label>
          <label>Gliese <input id="f-gliese" type="text" readonly></label>
        </div>
        <label>Name <input id="f-name" type="text" maxlength="10"></label>

        <fieldset>
          <legend>Right Ascension (J2000)</legend>
          <div class="row">
            <label>h <input id="f-ra-h" type="number" min="0" max="23" step="1"></label>
            <label>m <input id="f-ra-m" type="number" min="0" max="59" step="1"></label>
            <label>s <input id="f-ra-s" type="number" min="0" max="59.9" step="0.1"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Declination (J2000)</legend>
          <div class="row">
            <label>sign
              <select id="f-de-sign">
                <option value="+">+</option>
                <option value="-">−</option>
              </select>
            </label>
            <label>° <input id="f-de-d" type="number" min="0" max="90" step="1"></label>
            <label>′ <input id="f-de-m" type="number" min="0" max="59" step="1"></label>
            <label>″ <input id="f-de-s" type="number" min="0" max="59" step="1"></label>
          </div>
        </fieldset>

        <label>Vmag <input id="f-vmag" type="number" step="0.01"></label>
        <label>B−V <input id="f-bv" type="number" step="0.01"></label>
        <label>Spectral type <input id="f-sp" type="text" maxlength="20"></label>
        <label>pm RA (″/yr) <input id="f-pmra" type="number" step="0.001"></label>
        <label>pm Dec (″/yr) <input id="f-pmde" type="number" step="0.001"></label>
        <label>Parallax (″) <input id="f-plx" type="number" step="0.001"></label>
        <label>Radial vel (km/s) <input id="f-rv" type="number" step="1"></label>
      </form>

      <section id="sky-section">
        <fieldset>
          <legend>Location</legend>
          <label>Preset
            <select id="sky-preset"></select>
          </label>
          <div class="row">
            <label>Lat (°) <input id="sky-lat" type="number" min="-90" max="90" step="0.0001"></label>
            <label>Lon (°) <input id="sky-lon" type="number" min="-180" max="180" step="0.0001"></label>
          </div>
          <button id="btn-save-preset" type="button">Save as preset…</button>
        </fieldset>
        <fieldset>
          <legend class="legend-inline">
            <span>Time (UTC)</span>
            <label class="row-inline legend-toggle">
              <input id="sky-time-live" type="checkbox" checked> Live
            </label>
          </legend>
          <label>Date <input id="sky-date" type="date"></label>
          <label>Time
            <input id="sky-time-slider" type="range" min="0" max="86399" step="1">
            <span id="sky-time-readout">00:00:00</span>
          </label>
        </fieldset>
      </section>
    </aside>
  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch((error) => {
          console.error('Failed to register service worker.', error);
        });
      });
    }
  </script>
</body>
</html>
